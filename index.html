<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PacoBot — Juegos Tradicionales de Pácora</title>
  <meta name="theme-color" content="#1a3a8f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PacoBot">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <img src="pacobot-mascot.png" class="bot-icon" alt="PacoBot">
      <div>
        <h1>PacoBot</h1>
        <p>Asistente de Juegos Tradicionales</p>
      </div>
    </div>
    <span class="header-badge">🏆 Feria de Ciencias · Pácora 2026</span>
  </header>

  <!-- ── Main layout ─────────────────────────────────────────── -->
  <div class="main-layout">

    <!-- ── Chat ─────────────────────────────────────────────────── -->
    <main class="chat-container">
      <div id="chat-messages"></div>
      <div id="quick-options"></div>
      <div id="input-form" class="hidden">
        <input type="text" id="text-input" placeholder="Escribe tu respuesta..." autocomplete="off">
        <button class="send-btn" onclick="App.submitTextInput()">📤 Enviar</button>
      </div>
    </main>

  </div><!-- end main-layout -->
</div><!-- end app -->

<!-- ── Modal: Clave API de Groq ─────────────────────────────── -->
<div id="ia-modal" class="modal hidden">
  <div class="modal-box">
    <h2>🔑 Clave de Groq</h2>
    <p style="font-size:0.88rem;color:var(--text-muted);margin-bottom:14px;line-height:1.5">
      Ingresa tu clave gratuita de Groq para activar PacoBot IA.<br>
      Se guarda solo en este dispositivo.
    </p>
    <input type="password" id="ia-key-input" placeholder="gsk_xxxxxxxxxxxxxxxxxxxx"
           style="width:100%;padding:10px 13px;border:2px solid var(--border);border-radius:10px;font-size:0.95rem;outline:none">
    <p id="ia-key-error" style="color:var(--danger);font-size:0.8rem;margin-top:6px;min-height:18px"></p>
    <div class="modal-btns" style="margin-top:10px">
      <button class="btn-do"     onclick="App.saveAPIKey()">✅ Guardar y continuar</button>
      <button class="btn-cancel" onclick="App.closeIAModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ── Modal: Generador de juegos ───────────────────────────── -->
<div id="gen-modal" class="modal hidden">
  <div class="modal-box">
    <h2>✨ Inventor de Juegos</h2>

    <div class="form-group">
      <label>👥 ¿Cuántos jugadores?</label>
      <select id="gen-players">
        <option value="2">2 jugadores</option>
        <option value="3">3 jugadores</option>
        <option value="4" selected>4–5 jugadores</option>
        <option value="6">6–8 jugadores</option>
        <option value="10">9 o más jugadores</option>
      </select>
    </div>

    <div class="form-group">
      <label>🎒 ¿Qué materiales hay?</label>
      <select id="gen-material">
        <option value="none">Nada (solo el cuerpo)</option>
        <option value="ball">Una pelota</option>
        <option value="rope">Una cuerda</option>
        <option value="chalk">Tiza</option>
        <option value="mixed">Varios objetos</option>
      </select>
    </div>

    <div class="form-group">
      <label>📍 ¿Dónde van a jugar?</label>
      <select id="gen-space">
        <option value="indoor">Dentro de casa</option>
        <option value="small">Patio pequeño</option>
        <option value="medium" selected>Patio mediano</option>
        <option value="large">Parque o cancha</option>
      </select>
    </div>

    <div class="modal-btns">
      <button class="btn-do"     onclick="App.generateGame()">🎲 ¡Inventar Juego!</button>
      <button class="btn-cancel" onclick="App.closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<script src="db.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>

</body>
</html>
