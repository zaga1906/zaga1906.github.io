<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PacoBot 🤖 — Juegos Tradicionales de Pácora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <span class="bot-icon">🤖</span>
      <div>
        <h1>PacoBot</h1>
        <p>Asistente de Juegos Tradicionales</p>
      </div>
    </div>
    <span class="header-badge">🏆 Feria de Ciencias · Pácora 2026</span>
  </header>

  <!-- ── Main layout ─────────────────────────────────────────── -->
  <div class="main-layout">

    <!-- ── Sidebar ─────────────────────────────────────────────── -->
    <aside class="sidebar">
      <h2>¿Qué hacemos?</h2>

      <button class="action-btn btn-rec" onclick="App.startRecommender()">
        <span class="btn-icon">🎯</span>
        <span class="btn-label">Recomendar&#10;Juego</span>
      </button>

      <button class="action-btn btn-gen" onclick="App.startGenerator()">
        <span class="btn-icon">✨</span>
        <span class="btn-label">Inventar&#10;Juego Nuevo</span>
      </button>

      <button class="action-btn btn-survey" onclick="App.startSurvey()">
        <span class="btn-icon">📊</span>
        <span class="btn-label">Encuesta&#10;de Juegos</span>
      </button>

      <button class="action-btn btn-res" onclick="App.showResults()">
        <span class="btn-icon">🏆</span>
        <span class="btn-label">Ver&#10;Resultados</span>
      </button>

      <div class="sb-divider"></div>

      <button class="action-btn btn-exp" onclick="App.exportData()">
        <span class="btn-icon">💾</span>
        <span class="btn-label">Exportar&#10;Datos</span>
      </button>

      <button class="action-btn btn-clear" onclick="App.confirmClear()">
        <span class="btn-icon">🗑️</span>
        <span class="btn-label">Limpiar&#10;Todo</span>
      </button>
    </aside>

    <!-- ── Chat ─────────────────────────────────────────────────── -->
    <main class="chat-container">
      <div id="chat-messages"></div>
      <div id="quick-options"></div>
      <div id="input-form" class="hidden">
        <input type="text" id="text-input" placeholder="Escribe tu respuesta..." autocomplete="off">
        <button class="send-btn" onclick="App.submitTextInput()">📤 Enviar</button>
      </div>
    </main>

  </div><!-- end main-layout -->
</div><!-- end app -->

<!-- ── Modal: Generador de juegos ───────────────────────────── -->
<div id="gen-modal" class="modal hidden">
  <div class="modal-box">
    <h2>✨ Inventor de Juegos</h2>

    <div class="form-group">
      <label>👥 ¿Cuántos jugadores?</label>
      <select id="gen-players">
        <option value="2">2 jugadores</option>
        <option value="3">3 jugadores</option>
        <option value="4" selected>4–5 jugadores</option>
        <option value="6">6–8 jugadores</option>
        <option value="10">9 o más jugadores</option>
      </select>
    </div>

    <div class="form-group">
      <label>🎒 ¿Qué materiales hay?</label>
      <select id="gen-material">
        <option value="none">Nada (solo el cuerpo)</option>
        <option value="ball">Una pelota</option>
        <option value="rope">Una cuerda</option>
        <option value="chalk">Tiza</option>
        <option value="mixed">Varios objetos</option>
      </select>
    </div>

    <div class="form-group">
      <label>📍 ¿Dónde van a jugar?</label>
      <select id="gen-space">
        <option value="indoor">Dentro de casa</option>
        <option value="small">Patio pequeño</option>
        <option value="medium" selected>Patio mediano</option>
        <option value="large">Parque o cancha</option>
      </select>
    </div>

    <div class="modal-btns">
      <button class="btn-do"     onclick="App.generateGame()">🎲 ¡Inventar Juego!</button>
      <button class="btn-cancel" onclick="App.closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<script src="db.js"></script>
<script src="app.js"></script>

</body>
</html>
